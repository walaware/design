name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # --ignore-scripts skips the prepare build; we run check + package explicitly below.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Type-check
        run: pnpm run check
      - name: Build package (+ publint)
        run: pnpm run package
